name: news-intelligence

services:
  postgres:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: newsintel
      POSTGRES_USER: newsintel
      POSTGRES_PASSWORD: newsintel
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsintel -d newsintel"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: newsintel
      MINIO_ROOT_PASSWORD: change-me-now
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:

